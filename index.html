<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuSMP - 2D игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; border: 3px solid #2a2a3a; border-radius: 12px; }
        canvas { display: block; background: #1a237e; border-radius: 10px; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; flex-wrap: wrap; gap: 8px; }
        .hud { background: rgba(0,0,0,0.7); padding: 8px 14px; border-radius: 8px; color: #fff; font-size: 13px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); }
        .hud span { color: #ffd700; font-weight: bold; }
        #loginOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; backdrop-filter: blur(10px); z-index: 100; }
        #loginOverlay h1 { color: #ffd700; font-size: 36px; margin-bottom: 10px; }
        #loginOverlay p { color: #888; margin-bottom: 20px; }
        #loginOverlay input { background: #1e1e2e; border: 1px solid #2a2a3a; color: #fff; padding: 10px 16px; border-radius: 8px; margin: 4px; width: 200px; font-size: 14px; }
        #loginOverlay button { background: #ffd700; color: #000; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        #loginOverlay button:hover { transform: scale(1.05); }
        .login-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .hidden { display: none !important; }
        #errorMsg { color: #ff6b6b; font-size: 14px; margin-top: 10px; display: none; max-width: 400px; text-align: center; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 24px; border-radius: 10px; font-size: 14px; border-left: 4px solid #ffd700; opacity: 0; transition: 0.3s; z-index: 999; }
        #toast.show { opacity: 1; }
        .db-status { font-size: 11px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="game" width="900" height="600"></canvas>
    
    <div id="ui">
        <div class="hud">❤️ <span id="hpDisplay">100</span></div>
        <div class="hud">👤 <span id="playerNameDisplay">Гость</span></div>
        <div class="hud">📍 <span id="coordsDisplay">0, 0</span></div>
    </div>
    
    <div id="loginOverlay">
        <h1>🏕️ LuSMP</h1>
        <p>Введи имя — и погнали!</p>
        <div class="login-row">
            <input type="text" id="nameInput" placeholder="Твой ник" value="Player">
        </div>
        <button id="loginBtn" onclick="login()">🎮 Войти</button>
        <div id="errorMsg"></div>
        <div class="db-status" id="dbStatus">🔄 Проверка подключения...</div>
    </div>
    
    <div id="toast">Сообщение</div>
</div>

<script>
// ============================================================
//  КОНФИГ TURSO
// ============================================================
const TURSO_URL = 'https://lusmp-cursedd.aws-eu-west-1.turso.io';
const TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODQzOTE0OTAsImlkIjoiMDE5Zjc2MDUtMDcwMS03NTU4LThhNmUtZTI0YjJmMTdkZGYwIiwia2lkIjoicWpYbEhLbElGQmJNX29uRDlaWEkyWFVfazVBT3h3X3JIMF9TcUZ6MmU0ZyIsInJpZCI6ImM5ZjMzZTMxLWFkNTgtNDRiNC04MGE1LWIyMWY1NzE0ZGFhZSJ9.YdQIKsgs-KPS5tFQDKTYx54KQ7EKjh3P8FA3_bl_LcXy51lq4JpSFMGIipi3wI3h8Dp_DZTVjw7AMEMpolLRCQ';

// ============================================================
//  ИГРА
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 600;
const BLOCK = 32;
const WORLD_SIZE = 100;

let player = null;
let world = {};
let camera = { x: 0, y: 0 };
let keys = {};
let mouse = { x: 0, y: 0 };
let playerName = 'Гость';

// ============================================================
//  ЗАПРОС К TURSO (ЕДИНСТВЕННЫЙ ПРАВИЛЬНЫЙ ФОРМАТ)
// ============================================================
async function queryTurso(sql, params = []) {
    // Формируем запрос в правильном формате для Turso
    const requestBody = {
        requests: [
            {
                type: "execute",
                stmt: {
                    sql: sql,
                    args: params.map(p => {
                        if (typeof p === 'string') return { type: 'text', value: p };
                        if (typeof p === 'number') return { type: 'integer', value: p };
                        if (typeof p === 'boolean') return { type: 'boolean', value: p };
                        return { type: 'null', value: null };
                    })
                }
            }
        ]
    };
    
    console.log('📤 SQL:', sql);
    console.log('📤 Params:', params);
    
    const resp = await fetch(`${TURSO_URL}/v2/pipeline`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${TURSO_TOKEN}`
        },
        body: JSON.stringify(requestBody)
    });
    
    const data = await resp.json();
    console.log('📥 Ответ:', JSON.stringify(data, null, 2));
    
    if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}: ${data.error || JSON.stringify(data)}`);
    }
    
    if (data.results && data.results[0] && data.results[0].response) {
        if (data.results[0].response.error) {
            throw new Error(data.results[0].response.error);
        }
        if (data.results[0].response.result) {
            return data.results[0].response.result;
        }
    }
    return null;
}

// ============================================================
//  МИР
// ============================================================
function initWorld() {
    for (let x = 0; x < WORLD_SIZE; x++) {
        for (let y = 0; y < WORLD_SIZE; y++) {
            const key = `${x},${y}`;
            const val = Math.sin(x * 0.07) * Math.cos(y * 0.07) + Math.sin(x * 0.13 + y * 0.09) * 0.5;
            if (val < -0.3) {
                world[key] = { type: 'water', color: '#4FC3F7' };
            } else if (val < 0.1) {
                world[key] = { type: 'sand', color: '#FDD835' };
            } else if (val < 0.6) {
                world[key] = { type: 'grass', color: '#7CB342' };
            } else {
                world[key] = { type: 'stone', color: '#9E9E9E' };
            }
            if (Math.random() < 0.02 && world[key].type === 'grass') {
                world[key] = { type: 'tree', color: '#2E7D32' };
            }
        }
    }
}

// ============================================================
//  РИСОВАНИЕ
// ============================================================
function drawWorld() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0D1B2A');
    grad.addColorStop(0.5, '#1B2838');
    grad.addColorStop(1, '#2C3E50');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    const startX = Math.floor(camera.x / BLOCK) - 1;
    const startY = Math.floor(camera.y / BLOCK) - 1;
    const endX = startX + Math.ceil(W / BLOCK) + 2;
    const endY = startY + Math.ceil(H / BLOCK) + 2;
    
    for (let x = startX; x < endX; x++) {
        for (let y = startY; y < endY; y++) {
            const key = `${x},${y}`;
            const block = world[key];
            if (!block) continue;
            const sx = x * BLOCK - camera.x;
            const sy = y * BLOCK - camera.y;
            ctx.fillStyle = block.color;
            ctx.fillRect(sx, sy, BLOCK, BLOCK);
            if (block.type === 'tree') {
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(sx + 12, sy + 14, 8, 18);
                ctx.fillStyle = '#2E7D32';
                ctx.beginPath();
                ctx.arc(sx + 16, sy + 8, 14, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#388E3C';
                ctx.beginPath();
                ctx.arc(sx + 6, sy + 14, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(sx + 26, sy + 14, 10, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
}

// ============================================================
//  ИГРОК
// ============================================================
class Player {
    constructor(name) {
        this.name = name;
        this.x = WORLD_SIZE/2 * BLOCK;
        this.y = WORLD_SIZE/2 * BLOCK;
        this.radius = 16;
        this.speed = 3;
        this.hp = 100;
        this.maxHp = 100;
        this.angle = 0;
        this.color = '#4FC3F7';
    }
    
    draw(ctx) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 16;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.beginPath();
        ctx.arc(sx, sy, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        const ex = sx + Math.cos(this.angle) * 8;
        const ey = sy + Math.sin(this.angle) * 8;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex - 5, ey - 4, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex + 5, ey - 4, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(ex - 4 + Math.cos(this.angle)*2, ey - 4 + Math.sin(this.angle)*2, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex + 6 + Math.cos(this.angle)*2, ey - 4 + Math.sin(this.angle)*2, 2, 0, Math.PI*2);
        ctx.fill();
        
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.name, sx, sy - 28);
    }
}

// ============================================================
//  ЦИКЛ
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    update(dt);
    render();
    requestAnimationFrame(gameLoop);
}

function update(dt) {
    if (!player) return;
    let dx = 0, dy = 0;
    if (keys['w'] || keys['W'] || keys['ArrowUp']) dy = -1;
    if (keys['s'] || keys['S'] || keys['ArrowDown']) dy = 1;
    if (keys['a'] || keys['A'] || keys['ArrowLeft']) dx = -1;
    if (keys['d'] || keys['D'] || keys['ArrowRight']) dx = 1;
    if (dx || dy) {
        const len = Math.sqrt(dx*dx + dy*dy);
        dx /= len; dy /= len;
        player.x += dx * player.speed * dt * 60;
        player.y += dy * player.speed * dt * 60;
        player.angle = Math.atan2(dy, dx);
    }
    player.x = Math.max(0, Math.min(WORLD_SIZE * BLOCK, player.x));
    player.y = Math.max(0, Math.min(WORLD_SIZE * BLOCK, player.y));
    camera.x = player.x - W/2;
    camera.y = player.y - H/2;
    camera.x = Math.max(0, Math.min(WORLD_SIZE * BLOCK - W, camera.x));
    camera.y = Math.max(0, Math.min(WORLD_SIZE * BLOCK - H, camera.y));
    document.getElementById('coordsDisplay').textContent = `${Math.floor(player.x/BLOCK)}, ${Math.floor(player.y/BLOCK)}`;
}

function render() {
    ctx.clearRect(0, 0, W, H);
    drawWorld();
    if (player) player.draw(ctx);
}

// ============================================================
//  ВВОД
// ============================================================
document.addEventListener('keydown', (e) => { keys[e.key] = true; });
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    if (player) {
        player.angle = Math.atan2(mouse.y - (player.y - camera.y), mouse.x - (player.x - camera.x));
    }
});

// ============================================================
//  ТОСТ
// ============================================================
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================================================
//  ЛОГИН (ONLINE)
// ============================================================
async function login() {
    const name = document.getElementById('nameInput').value.trim() || 'Player';
    const errorEl = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');
    const dbStatus = document.getElementById('dbStatus');
    
    errorEl.style.display = 'none';
    errorEl.textContent = '';
    loginBtn.textContent = '⏳ Подключение...';
    loginBtn.disabled = true;
    dbStatus.textContent = '🔄 Подключение к Turso...';
    dbStatus.style.color = '#ffd700';
    
    try {
        // 1. ПРОВЕРЯЕМ ПОДКЛЮЧЕНИЕ
        console.log('🔌 Проверка подключения к Turso...');
        const testResult = await queryTurso('SELECT 1 as test');
        console.log('✅ Turso отвечает:', testResult);
        dbStatus.textContent = '✅ Turso подключена!';
        dbStatus.style.color = '#4caf50';
        
        // 2. СОЗДАЁМ ТАБЛИЦУ
        console.log('📦 Создание таблицы...');
        const createSQL = `
            CREATE TABLE IF NOT EXISTS players (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                name TEXT UNIQUE NOT NULL,
                created_at DATETIME DEFAULT CURRENT_TIMESTAMP
            )
        `;
        await queryTurso(createSQL);
        console.log('✅ Таблица создана/проверена');
        
        // 3. СОХРАНЯЕМ ИГРОКА
        console.log(`💾 Сохранение игрока: ${name}`);
        const insertSQL = `
            INSERT INTO players (name) 
            VALUES (?) 
            ON CONFLICT(name) DO UPDATE SET name = excluded.name
        `;
        await queryTurso(insertSQL, [name]);
        console.log(`✅ Игрок "${name}" сохранён!`);
        dbStatus.textContent = `✅ Игрок "${name}" в БД!`;
        
        // 4. ПОЛУЧАЕМ СПИСОК ИГРОКОВ
        const selectSQL = `SELECT id, name, created_at FROM players ORDER BY id DESC LIMIT 5`;
        const result = await queryTurso(selectSQL);
        if (result && result.rows) {
            console.log('📋 Последние игроки:');
            result.rows.forEach(row => {
                console.log(`   - ${row[1]} (ID: ${row[0]})`);
            });
        }
        
        // 5. ВХОД В ИГРУ
        player = new Player(name);
        playerName = name;
        document.getElementById('playerNameDisplay').textContent = name;
        document.getElementById('loginOverlay').classList.add('hidden');
        showToast(`🎉 Добро пожаловать, ${name}!`);
        
    } catch(e) {
        console.error('❌ Ошибка:', e);
        errorEl.textContent = `❌ ${e.message || 'Неизвестная ошибка'}`;
        errorEl.style.display = 'block';
        dbStatus.textContent = '❌ Ошибка подключения к Turso';
        dbStatus.style.color = '#ff6b6b';
    } finally {
        loginBtn.textContent = '🎮 Войти';
        loginBtn.disabled = false;
    }
}

// ============================================================
//  ЗАПУСК
// ============================================================
initWorld();
gameLoop(0);

console.log('🏕️ LuSMP загружена!');
console.log('🌐 Turso URL:', TURSO_URL);

// Проверяем подключение при старте
document.getElementById('dbStatus').textContent = '🔄 Проверка Turso...';
queryTurso('SELECT 1 as test')
    .then(() => {
        document.getElementById('dbStatus').textContent = '✅ Turso онлайн!';
        document.getElementById('dbStatus').style.color = '#4caf50';
    })
    .catch(() => {
        document.getElementById('dbStatus').textContent = '⚠️ Turso недоступна (игра локальная)';
        document.getElementById('dbStatus').style.color = '#ff9800';
    });
</script>
</body>
</html>
